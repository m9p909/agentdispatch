{% extends "layout.html" %}

{% block title %}Start New Session - Agent Builder{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1>Start New Chat Session</h1>

        {% if agents.is_empty() %}
            <div class="alert alert-warning">No agents available. Please <a href="/agents/new">create an agent</a> first.</div>
        {% else %}
            <form method="POST" action="/sessions">
                <div class="form-group mb-3">
                    <label class="form-label">Select Agent</label>
                    <select class="form-select" name="agent_id" required>
                        <option value="">-- Choose an agent --</option>
                        {% for agent in agents %}
                        <option value="{{ agent.id }}">{{ agent.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <button class="btn btn-primary" type="submit">Start Chat</button>
                    <a class="btn btn-secondary" href="/sessions">Cancel</a>
                </div>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}
