{% extends "base.html" %}

{% block title %}New Session - Agent Builder{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Start New Session</h2>
</div>

<div class="card" style="max-width: 600px;">
    <form hx-post="/sessions" hx-boost="true">
        <div class="form-group">
            <label for="agent_id">Select an Agent *</label>
            <select id="agent_id" name="agent_id" required>
                <option value="">Choose an agent...</option>
                {% for agent in agents %}
                <option value="{{ agent.id }}">{{ agent.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-success">Start Chat</button>
            <a href="/sessions" class="btn" style="background-color: #95a5a6;" hx-boost="true">Back</a>
        </div>
    </form>
</div>
{% endblock %}
